<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" routerLink="" (click)="setActive('home')">
      <i class="bi bi-rocket-takeoff me-2"></i>Red Comunitaria
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNav"
      aria-controls="mainNav"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink=""
            [class.active]="activeRoute() === 'home'"
            (click)="setActive('home')">
            Home
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="statistics"
            [class.active]="activeRoute() === 'statistics'"
            (click)="setActive('statistics')">
            Estadísticas
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="global-businesses"
            [class.active]="activeRoute() === 'global-businesses'"
            (click)="setActive('global-businesses')">
            Emprendimientos / Global
          </a>
        </li>
        @if (isLoggedIn()) {
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="user-section"
              [class.active]="activeRoute() === 'user-section'"
              (click)="setActive('user-section')">
              Sección Usuario
            </a>
          </li>
        }
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="top-businesses"
            [class.active]="activeRoute() === 'top-businesses'"
            (click)="setActive('top-businesses')">
            Empresas Más Buscadas
          </a>
        </li>
      </ul>

      <!-- Auth Section -->
      <div class="navbar-auth ms-lg-3 d-flex align-items-center gap-2">
        @if (isLoggedIn()) {
          @if (authService.getCurrentUser(); as user) {
            <a routerLink="profile" class="user-info-link" (click)="setActive('profile')">
              <span class="user-name d-none d-lg-inline">{{ user.username }}</span>
            </a>
          }
          <app-logout-button />
        } @else {
          <app-login-button />
        }
      </div>
    </div>
  </div>
</nav>
